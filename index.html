<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Health Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Daily Health Dashboard</h1>
    <div id="dashboard">
        <div class="metric">
            <h2>Walking Steps</h2>
            <div class="progress-bar">
                <div id="steps-bar" class="progress-fill"></div>
            </div>
            <p id="steps-text">0 / 10000 steps</p>
        </div>
        <div class="metric">
            <h2>Sleep Hours</h2>
            <div class="progress-bar">
                <div id="sleep-bar" class="progress-fill"></div>
            </div>
            <p id="sleep-text">0 / 8 hours</p>
        </div>
    </div>
    <h2>Log Today's Activity</h2>
    <form id="activity-form">
        <label for="steps">Steps walked:</label>
        <input type="number" id="steps" min="0" placeholder="e.g., 5000">
        <label for="sleep">Sleep hours:</label>
        <input type="number" id="sleep" min="0" step="0.5" placeholder="e.g., 7.5">
        <button type="submit">Save</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
